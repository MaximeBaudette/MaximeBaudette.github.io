name: Render a CV
on:
  push:
    branches:
      - master
      - dev
    paths:
      - "_data/cv.yml"
      - "assets/rendercv/design.yaml"
      - "assets/rendercv/locale.yaml"
      - "assets/rendercv/settings.yaml"
  workflow_call:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  rendercv:
    name: RenderCV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install RenderCV
        run: pip install "rendercv[full]"
      - name: RenderCV
        run: |
          rendercv render _data/cv.yml --settings assets/rendercv/settings.yaml
          rm -f assets/rendercv/rendercv_output/*.typ
      - name: Upload rendercv_output as an artifact
        uses: actions/upload-artifact@v4
        with:
          name: RenderCV Output
          path: assets/rendercv/rendercv_output
      - name: Push PDF to gh-pages
        run: |
          PDF_FILE=$(ls assets/rendercv/rendercv_output/*.pdf | head -1)
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"
          git fetch origin gh-pages
          git checkout gh-pages
          mkdir -p assets/pdf
          cp "$PDF_FILE" assets/pdf/cv.pdf
          git add assets/pdf/cv.pdf
          git diff --cached --quiet || git commit -m "chore: render the latest CV"
          git push origin gh-pages